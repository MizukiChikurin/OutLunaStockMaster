<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
            background: #f5f6fa;
            padding: 24px;
            color: #2c3e50;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 28px 32px;
        }
        h2 {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e9ecef;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            margin-bottom: 16px;
        }
        thead th {
            background: #2c3e50;
            color: #ffffff;
            padding: 12px 10px;
            text-align: center;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        tbody td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid #e9ecef;
        }
        tbody tr:nth-child(even) {
            background: #f8f9fa;
        }
        tbody tr:hover {
            background: #e8f4f8;
        }
        .up {
            color: #c01e1e;
            font-weight: 600;
        }
        .down {
            color: #238b23;
            font-weight: 600;
        }
        .footer {
            text-align: center;
            color: #868e96;
            font-size: 12px;
            line-height: 1.6;
            padding-top: 8px;
            border-top: 1px solid #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>{{ title }}</h2>
        <table>
            <thead>
                <tr>
                    {% for header in headers %}
                    <th>{{ header }}</th>
                    {% endfor %}
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                <tr>
                    {% for cell in row %}
                    <td{% if cell.class %} class="{{ cell.class }}"{% endif %}>
                        {% if cell.safe %}{{ cell.value | safe }}{% else %}{{ cell.value }}{% endif %}
                    </td>
                    {% endfor %}
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <div class="footer">{{ footer }}</div>
    </div>
</body>
</html>
